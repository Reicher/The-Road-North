name: Build game

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: game-build-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.6.3
  ANDROID_BUILD_TOOLS_VERSION: 35.0.1
  ANDROID_PLATFORM_VERSION: 35
  ANDROID_NDK_VERSION: 28.1.13356709
  ANDROID_CMAKE_VERSION: 3.10.2.4988404

jobs:
  web:
    name: Build web
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Godot and export templates
        run: |
          curl --fail --location --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl --fail --location --output templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mkdir -p "$HOME/.local/bin" "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$HOME/.local/bin/godot"
          chmod +x "$HOME/.local/bin/godot"
          unzip -q templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Export web build
        run: |
          mkdir -p build/web
          godot --headless --path . --export-release Web build/web/index.html
          touch build/web/.nojekyll

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-road-north-web
          path: build/web

      - name: Configure Pages
        if: github.event_name != 'pull_request'
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v5
        with:
          path: build/web

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Android SDK packages
        run: |
          sdkmanager --install \
            "platform-tools" \
            "build-tools;${ANDROID_BUILD_TOOLS_VERSION}" \
            "platforms;android-${ANDROID_PLATFORM_VERSION}" \
            "cmdline-tools;latest" \
            "cmake;${ANDROID_CMAKE_VERSION}" \
            "ndk;${ANDROID_NDK_VERSION}"
          yes | sdkmanager --licenses >/dev/null

      - name: Install Godot and export templates
        run: |
          curl --fail --location --output godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl --fail --location --output templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          mkdir -p "$HOME/.local/bin" "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" "$HOME/.local/bin/godot"
          chmod +x "$HOME/.local/bin/godot"
          unzip -q templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Configure Android export
        run: |
          mkdir -p "$HOME/.config/godot" "$HOME/.android"
          keytool -genkeypair \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -keypass android \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          cat > "$HOME/.config/godot/editor_settings-4.6.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_HOME}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "$HOME/.android/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF

      - name: Export Android APK
        run: |
          mkdir -p build/android
          godot --headless --path . --export-debug "Android APK (Debug)" build/android/the-road-north-debug.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: the-road-north-android-debug
          path: build/android/the-road-north-debug.apk

  deploy:
    if: github.event_name != 'pull_request'
    concurrency:
      group: pages
      cancel-in-progress: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: web
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
